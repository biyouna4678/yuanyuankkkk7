        .widget-desc { font-size: 12px; color: #999; }
    </style>
</head>
<body x-data="desktopApp()" @click="handleBgClick" x-init="init()" @contextmenu.prevent="() => {}">
    <div class="status-bar">
        <div>18:32</div>
        <div class="status-right">
            <svg width="22" height="12" viewBox="0 0 22 12"><rect x="1" y="8" width="3.2" height="4" rx="1.2" class="s-fill"/><rect x="6" y="6" width="3.2" height="6" rx="1.2" class="s-fill"/><rect x="11" y="4" width="3.2" height="8" rx="1.2" class="s-fill"/><rect x="16" y="2" width="3.2" height="10" rx="1.2" class="s-fill" opacity="0.2"/></svg>
            <svg width="18" height="14" viewBox="0 0 18 14"><circle cx="9" cy="12" r="1.8" class="s-fill"/><path d="M5 8 Q9 4 13 8" class="s-line" stroke-width="2.2"/><path d="M2 5 Q9 -1 16 5" class="s-line" stroke-width="2.2"/></svg>
            <svg width="22" height="12" viewBox="0 0 22 12"><rect x="1" y="1.5" width="16" height="9" rx="3" class="s-line" stroke-width="1.8"/><rect x="4" y="4" width="7" height="4" rx="1" class="s-fill"/><path d="M19.5 4.5 V7.5" class="s-line" stroke-width="2"/></svg>
        </div>

    <!-- 编辑头 -->
    <div class="edit-header" :class="editMode ? 'show' : ''">
        <div style="position: relative;">
            <button class="edit-btn" @click.stop="menuOpen = !menuOpen">+ 添加</button>
            <div class="edit-menu" x-show="menuOpen" x-transition x-cloak @click.stop>
                <div class="edit-menu-item" @click="openWidgetModal()">📦 添加小组件</div>
                <div class="edit-menu-item">🎨 自定义图标</div>
                <div class="edit-menu-item">🖼️ 主屏幕壁纸</div>

        <button class="edit-btn" @click="exitEditMode()">完成</button>

    <!-- Page Container -->
    <div class="pages-container" @scroll="activePage = Math.round($el.scrollLeft / window.innerWidth)">
        <template x-for="(page, pIndex) in pages" :key="pIndex">
            <div class="page" :id="'page-' + pIndex" @touchstart="startLongPress" @touchend="clearLongPress" @touchmove="clearLongPress" @mousedown="startLongPress" @mouseup="clearLongPress" @mousemove="clearLongPress">
                <template x-for="item in page" :key="item.id">
                    <div class="app-item" :class="(editMode ? 'shake ' : '') + (item.type === 'widget' ? 'w-'+item.size : '')" :data-id="item.id">
                        <div class="delete-btn" x-show="editMode" @click.stop="deleteItem(pIndex, item.id)">✕</div>
                        
                        <template x-if="item.type === 'app'">
                            <div class="app-box" x-html="item.svg"></div>
                        </template>
                        <template x-if="item.type === 'app'">
                            <div class="app-label" x-text="item.label"></div>

                        <template x-if="item.type === 'widget'">
                            <div class="widget-card-actual">
                                <div class="widget-title" x-text="item.label"></div>
                                <div class="widget-desc" x-text="item.size === '2x2' ? '小组件' : (item.size === '4x2' ? '中组件' : '大组件')"></div>

    <!-- 指示器 -->
    <div class="indicator-wrapper">
        <template x-for="(page, idx) in pages" :key="idx">
            <div class="dot" :class="activePage === idx ? 'active' : ''"></div>
        </template>
    </div>

    <!-- Dock -->
    <div class="dock-container" id="dock-container">
        <template x-for="item in dock" :key="item.id">
            <div class="app-item" :class="editMode ? 'shake' : ''" :data-id="item.id">
                <div class="delete-btn" x-show="editMode" @click.stop="deleteDockItem(item.id)">✕</div>
                <div class="app-box" x-html="item.svg"></div>
            </div>
        </template>

    <!-- 小组件弹窗 -->
    <div class="widget-modal-overlay" :class="widgetModalOpen ? 'show' : ''" @click="widgetModalOpen = false">
        <div class="widget-modal" @click.stop>
            <div class="modal-header">
                <div>添加小组件</div>
                <div class="close-btn" @click="widgetModalOpen = false">✕</div>
            </div>
            <div class="modal-tabs">
                <div class="modal-tab" :class="widgetTab === '2x2' ? 'active' : ''" @click="widgetTab = '2x2'">小 2×2</div>
                <div class="modal-tab" :class="widgetTab === '4x2' ? 'active' : ''" @click="widgetTab = '4x2'">中 4×2</div>
                <div class="modal-tab" :class="widgetTab === '4x4' ? 'active' : ''" @click="widgetTab = '4x4'">大 4×4</div>
            </div>
            <div class="modal-content">
                <template x-for="widget in availableWidgets.filter(w => w.size === widgetTab)" :key="widget.id">
                    <div class="widget-preview-card" @click="addWidget(widget)">
                        <div class="widget-title" x-text="widget.label"></div>
                        <div class="widget-desc" x-text="widget.desc"></div>
                        <div class="edit-btn" style="margin-top: 10px;">添加组件</div>

                <div x-show="widgetTab === '4x4'" style="text-align: center; color: #999; margin-top: 20px; font-size: 14px;">

    </div>

    <script>
        const initData = [
            { id: 'app1', type: 'app', label: '轻盈计划', svg: '<svg width="32" height="32" viewBox="0 0 32 32"><path d="M10 24 Q16 22 24 8 Q18 8 10 16 Z" class="s-line"/><path d="M11 23 L14 20 M17 17 L20 14" class="s-line" stroke-width="2.2"/></svg>' },
            { id: 'app2', type: 'app', label: '查手机', svg: '<svg width="32" height="32" viewBox="0 0 32 32"><rect x="9" y="4" width="14" height="24" rx="3.5" class="s-line" /><line x1="13" y1="24" x2="19" y2="24" class="s-line" stroke-width="2" opacity="0.4" /><circle cx="16" cy="6.5" r="0.8" class="s-fill" /></svg>' },
            { id: 'app3', type: 'app', label: '情侣空间', svg: '<svg width="32" height="32" viewBox="0 0 32 32"><path d="M11 8 C6 4, 1 9, 11 19 C21 9, 16 4, 11 8" class="s-line" stroke-width="3.2"/><path d="M22 15 C19 12, 16 16, 22 22 C28 16, 25 12, 22 15" class="s-line" stroke-width="2.5"/></svg>' },
            { id: 'app4', type: 'app', label: '经期记录', svg: '<svg width="36" height="36" viewBox="0 0 36 36"><g class="s-fill"><circle cx="18" cy="10" r="5.5"/><circle cx="18" cy="26" r="5.5"/><circle cx="10" cy="18" r="5.5"/><circle cx="26" cy="18" r="5.5"/><circle cx="12.3" cy="12.3" r="5.5"/><circle cx="23.7" cy="23.7" r="5.5"/><circle cx="12.3" cy="23.7" r="5.5"/><circle cx="23.7" cy="12.3" r="5.5"/></g><g fill="white"><circle cx="18" cy="13" r="3.5"/><circle cx="18" cy="23" r="3.5"/><circle cx="13" cy="18" r="3.5"/><circle cx="23" cy="18" r="3.5"/><circle cx="14.5" cy="14.5" r="3.5"/><circle cx="21.5" cy="21.5" r="3.5"/><circle cx="14.5" cy="21.5" r="3.5"/><circle cx="21.5" cy="14.5" r="3.5"/></g><circle cx="18" cy="18" r="3.5" class="s-fill"/></svg>' },
            { id: 'app5', type: 'app', label: '心动OOTD', svg: '<svg width="32" height="32" viewBox="0 0 32 32"><path d="M7 6 Q7 4 9 4 H23 Q25 4 25 6 V26 Q25 28 23 28 H9 Q7 28 7 26 Z" class="s-line" /><line x1="16" y1="4" x2="16" y2="28" class="s-line" stroke-width="1.5" /><circle cx="13.5" cy="16" r="1" class="s-fill" /><circle cx="18.5" cy="16" r="1" class="s-fill" /></svg>' },
            { id: 'app6', type: 'app', label: '解梦', svg: '<svg width="32" height="32" viewBox="0 0 32 32"><path d="M22 20 A8 8 0 1 1 12 10 A6 6 0 0 0 22 20" class="s-line"/><path d="M22 6 L22.5 6 M26 10 L26.5 10" class="s-line" stroke-width="4"/></svg>' },
            { id: 'app7', type: 'app', label: '塔罗牌', svg: '<svg width="32" height="32" viewBox="0 0 32 32"><path d="M16 6 L19 13 H26 L21 18 L23 26 L16 21 L9 26 L11 18 L6 13 H13 Z" class="s-line"/></svg>' },
            { id: 'app8', type: 'app', label: '世界书', svg: '<svg width="32" height="32" viewBox="0 0 32 32"><path d="M9 5 H23 C24 5 25 6 25 7 V23 C25 24 24 25 23 25 H9 C8 25 7 24 7 23 V7 C7 6 8 5 9 5 Z" class="s-line" /><path d="M7 23 C7 25 8 27 10 27 H25 V25" class="s-line" /><path d="M25 25 C23 25 22 24 22 23" class="s-line" /><path d="M11 5 V16 L14 13 L17 16 V5" class="s-line" stroke-width="2.5" /></svg>' }
        ];

        const initDock = [
            { id: 'dock1', type: 'app', label: '设置', svg: '<svg width="32" height="32" viewBox="0 0 32 32"><path d="M16 12 A4 4 0 1 1 16 20 A4 4 0 1 1 16 12" class="s-line" /><path d="M14.5 4.5 L17.5 4.5 L18 7 Q19 7.5 20 8 L22.5 7 L24.5 9 L23 11.5 Q23.5 12.5 24 13.5 L27 14 L27 17 L24 17.5 Q23.5 18.5 23 19.5 L24.5 22 L22.5 24 L20 23 Q19 23.5 18 24 L17.5 27 L14.5 27 L14 24 Q13 23.5 12 23 L9.5 24 L7.5 22 L9 19.5 Q8.5 18.5 8 17.5 L5 17 L5 14 L8 13.5 Q8.5 12.5 9 11.5 L7.5 9 L9.5 7 L12 8 Q13 7.5 14 7 Z" class="s-line" stroke-width="2.5" /></svg>' },
            { id: 'dock2', type: 'app', label: '论坛', svg: '<svg width="32" height="32" viewBox="0 0 32 32"><path d="M6 12 H18 V20 H10 L6 24 Z" class="s-line"/><path d="M22 10 V16 H26 L30 20 V10 H22" class="s-line" stroke-width="2.2"/></svg>' },
            { id: 'dock3', type: 'app', label: '信件', svg: '<svg width="32" height="32" viewBox="0 0 32 32"><rect x="5" y="8" width="22" height="16" rx="2" class="s-line" fill="white" /><path d="M5 8 L16 16 L27 8" class="s-line" /></svg>' },
            { id: 'dock4', type: 'app', label: '商城', svg: '<svg width="32" height="32" viewBox="0 0 32 32"><path d="M8 12 L6 26 H26 L24 12 Z" class="s-line" fill="white" /><path d="M11 12 Q11 6, 16 6 Q21 6, 21 12" class="s-line" /><line x1="7" y1="18" x2="25" y2="18" class="s-line" stroke-width="1.5" opacity="0.4" /></svg>' }
        ]

        document.addEventListener('alpine:init', () => {
            Alpine.data('desktopApp', () => ({
                activePage: 0,
                editMode: false,
                menuOpen: false,
                widgetModalOpen: false,
                widgetTab: '2x2',
                
                pages: [JSON.parse(JSON.stringify(initData))], // 二维数组
                dock: JSON.parse(JSON.stringify(initDock)),
                deletedItems: [],
                
                availableWidgets: [
                    { type: 'widget', size: '2x2', label: '纪念日', desc: '倒数纪念日与重要事件' },
                    { type: 'widget', size: '2x2', label: '电池状态', desc: '显示双方手机电量' },
                    { type: 'widget', size: '4x2', label: '一起看', desc: '当前进度与封面' },
                    { type: 'widget', size: '4x2', label: '音乐播放器', desc: '一起听正在播放' },
                    { type: 'widget', size: '4x4', label: '便签卡片', desc: '大尺寸图文手帐' }
                ],
                
                longPressTimer: null,
                sortables: [],

                init() {
                    this.$nextTick(() => { this.initDragAndDrop(); });
                    this.$watch('editMode', val => {
                        this.sortables.forEach(s => s.option("disabled", !val));
                    });
                },

                startLongPress(e) {
                    if (this.editMode || e.target.closest('.delete-btn')) return;
                    this.longPressTimer = setTimeout(() => {
                        this.editMode = true;
                        if (navigator.vibrate) navigator.vibrate(50);
                    }, 500);
                },

                clearLongPress() {
                    if (this.longPressTimer) {
                        clearTimeout(this.longPressTimer);
                        this.longPressTimer = null;
                    }
                },

                exitEditMode() {
                    this.editMode = false;
                    this.menuOpen = false;
                    this.syncDataFromDOM();
                },

                handleBgClick(e) {
                    if (this.editMode && !e.target.closest('.app-item') && !e.target.closest('.edit-header') && !e.target.closest('.delete-btn')) {
                        this.exitEditMode();
                    }
                    if (this.menuOpen) this.menuOpen = false;
                },

                openWidgetModal() {
                    this.menuOpen = false;
                    this.widgetModalOpen = true;
                },

                addWidget(widget) {
                    const newWidget = { ...widget, id: 'w_' + Date.now() };
                    // 确保有足够的页面
                    if (this.pages.length === 0) this.pages.push([]);
                    this.pages[this.activePage].push(newWidget);
                    this.widgetModalOpen = false;
                    
                    this.$nextTick(() => { this.initDragAndDrop(); });
                },

                deleteItem(pageIndex, itemId) {
                    const idx = this.pages[pageIndex].findIndex(i => i.id === itemId);
                    if (idx > -1) {
                        const item = this.pages[pageIndex].splice(idx, 1)[0];
                        this.deletedItems.push(item);
                        this.$nextTick(() => { this.initDragAndDrop(); });
                    }
                },

                deleteDockItem(itemId) {
                    const idx = this.dock.findIndex(i => i.id === itemId);
                    if (idx > -1) {
                        const item = this.dock.splice(idx, 1)[0];
                        this.deletedItems.push(item);
                        this.$nextTick(() => { this.initDragAndDrop(); });
                    }
                },

                initDragAndDrop() {
                    this.sortables.forEach(s => s.destroy());
                    this.sortables = [];

                    const pageEls = document.querySelectorAll('.page');
                    pageEls.forEach((el, index) => {
                        const s = new Sortable(el, {
                            group: 'desktop',
                            animation: 250,
                            disabled: !this.editMode, // 只有开启编辑模式才能拖拽，或者由长按开启
                            ghostClass: 'sortable-ghost',
                            onEnd: () => { this.syncDataFromDOM(); }
                        });
                        this.sortables.push(s);
                    });

                    const dockEl = document.getElementById('dock-container');
                    if (dockEl) {
                        const sDock = new Sortable(dockEl, {
                            group: { name: 'desktop', put: (to, from, dragEl) => !dragEl.classList.contains('w-2x2') && !dragEl.classList.contains('w-4x2') && !dragEl.classList.contains('w-4x4') }, // Dock不能放小组件
                            animation: 250,
                            disabled: !this.editMode,
                            ghostClass: 'sortable-ghost',
                            onEnd: () => { this.syncDataFromDOM(); }
                        });
                        this.sortables.push(sDock);
                    }
                },

                syncDataFromDOM() {
                    const allItems = {};
                    this.pages.forEach(p => p.forEach(i => allItems[i.id] = i));
                    this.dock.forEach(i => allItems[i.id] = i);

                    const newPages = [];
                    document.querySelectorAll('.page').forEach(pageEl => {
                        const pageItems = [];
                        pageEl.querySelectorAll('.app-item').forEach(itemEl => {
                            const id = itemEl.getAttribute('data-id');
                            if (allItems[id]) pageItems.push(allItems[id]);
                        });
                        newPages.push(pageItems);
                    });

                    const newDock = [];
                    document.querySelectorAll('#dock-container .app-item').forEach(itemEl => {
                        const id = itemEl.getAttribute('data-id');
                        if (allItems[id]) newDock.push(allItems[id]);
                    });

                    this.pages = newPages;
                    this.dock = newDock;
                    
                    // 等待Alpine重新渲染以防状态丢失导致拖拽卡顿
                    this.$nextTick(() => { this.initDragAndDrop(); });
                }
            }));
        });
    </script>
</body>
